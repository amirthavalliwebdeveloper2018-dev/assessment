{% extends "base.html" %}

{% load static %}

{% block css %}
<link rel="stylesheet" href="{% static 'style/style.css' %}">
{% endblock %}

{% block content %}

<div class="container">

    <!-- Page Heading -->

    <div class="text-center pb-4 pt-3">

        <h2 class="page-title">
            Add Attendance
        </h2>

    </div>

    <div class="row justify-content-center">

        <div class="col-lg-10">

            <div class="page-card">

                <form method="POST">

                    {% csrf_token %}

                    <div class="row">

                        <!-- Student -->

                        <div class="col-md-6 mb-4">

                            <label class="form-label">
                                Student
                            </label>

                            {{ form.student }}

                        </div>

                        <!-- Date -->

                        <div class="col-md-3 mb-4">

                            <label class="form-label">
                                Date
                            </label>

                            {{ form.date }}

                        </div>

                        <!-- Status -->

                        <div class="col-md-3 mb-4">

                            <label class="form-label">
                                Status
                            </label>

                            {{ form.status }}

                        </div>

                    </div>

                    <hr>

                    <div class="d-flex justify-content-end gap-3 mt-4">

                        <a href="{% url 'attendance_list' %}" class="btn btn-outline-secondary">
                            Cancel
                        </a>

                        <button type="submit" class="btn btn-primary">
                            Save Attendance
                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
