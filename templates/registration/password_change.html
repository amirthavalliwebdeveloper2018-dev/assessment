{% extends "base.html" %}

{% block content %}

<div class="container py-5 d-flex justify-content-center align-items-start">
    <div class="card shadow-lg border-0 p-4" style="max-width:500px; width:100%; border-radius:20px;">

        <div class="text-center mb-4">
            <i class="bi bi-shield-lock-fill text-primary" style="font-size:55px;"></i>

            <h2 class="mt-3 fw-bold">Change Password</h2>

            <p class="text-muted">
                Update your account password securely.
            </p>
        </div>

        <form method="post">

            {% csrf_token %}

            {% for field in form %}

                <div class="mb-3">

                    <label class="form-label fw-semibold">
                        {{ field.label }}
                    </label>

                    {{ field }}

                    {% if field.errors %}
                        <div class="text-danger small mt-1">
                            {{ field.errors }}
                        </div>
                    {% endif %}

                </div>

            {% endfor %}

            <button type="submit" class="btn btn-primary w-100 py-2">
                <i class="bi bi-check-circle-fill"></i>
                Update Password
            </button>

        </form>

    </div>

</div>

{% endblock %}
