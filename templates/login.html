{% extends "base.html" %}
{% load static %}

{% block css %}
<link rel="stylesheet" href="{% static 'style/login.css' %}">
{% endblock %}

{% block content %}

<div class="row justify-content-center align-items-center" style="min-height:80vh;">
    <div class="col-lg-4 col-md-6 text-center">

<div class="login-card text-center">
<div class="login-header text-center mb-4">
                    <i class="bi bi-mortarboard-fill display-5"></i>
                <h3 class="mt-2 mb-0">Welcome Back</h3>
                <small>Login to Student Management System</small>
            </div>

<div class="login-body">


<form method="POST" autocomplete="off">
                    {% csrf_token %}

                    <!-- Username -->
                    <div class="mb-3 text-start">
                        <label class="form-label fw-semibold">
                            Username
                        </label>

                        <div class="input-group">

                            <span class="input-group-text">
                                <i class="bi bi-person-fill"></i>
                            </span>

                            <input
                                type="text"
                                class="form-control"
                                name="username"
                                placeholder="Enter username"
                                    autocomplete="off"
                                required>

                        </div>
                    </div>

                    <!-- Password -->
                    <div class="mb-2 text-start">  

                        <label class="form-label fw-semibold">
                            Password
                        </label>

                        <div class="input-group">

                            <span class="input-group-text">
                                <i class="bi bi-lock-fill"></i>
                            </span>

                            <input
                                type="password"
                                class="form-control"
                                id="password"
                                name="password"
                                placeholder="Enter password"
                               autocomplete="new-password"
                                required>

                            <button
                                class="btn btn-outline-secondary"
                                type="button"
                                id="togglePassword">

                                <i class="bi bi-eye-fill"></i>

                            </button>

                        </div>

                    </div>

                    <!-- Password Hint -->
                    <div class="form-text mb-3">
                        <i class="bi bi-info-circle"></i>
                        Use your registered account password.
                    </div>

                    <!-- Remember & Forgot -->
                    <div class="d-flex justify-content-between align-items-center mb-4">

                        <div class="form-check">

                            <input
                                class="form-check-input"
                                type="checkbox"
                                id="remember">

                            <label class="form-check-label">
                                Remember Me
                            </label>

                        </div>

                       <a href="{% url 'password_reset' %}" 
   class="text-decoration-none small">

    Forgot Password?

</a>
                    </div>

                    <button
                        type="submit"
                        class="btn btn-dark w-100 rounded-3 py-2">

                        <i class="bi bi-box-arrow-in-right me-2"></i>
                        Login

                    </button>

                </form>

            </div>

        </div>

    </div>
</div>

{% endblock %}

{% block scripts %}

<script>

const togglePassword = document.getElementById("togglePassword");
const password = document.getElementById("password");

togglePassword.addEventListener("click", function(){

    if(password.type==="password"){

        password.type="text";

        this.innerHTML='<i class="bi bi-eye-slash-fill"></i>';

    }else{

        password.type="password";

        this.innerHTML='<i class="bi bi-eye-fill"></i>';

    }

});

</script>

{% endblock %}
