{% extends "base.html" %}

{% load static %}

{% block css %}
<link rel="stylesheet" href="{% static 'style/style.css' %}">
{% endblock %}

{% block content %}

<div class="container">

    <!-- Page Heading -->

    <div class="text-center pb-4 pt-3">

        <h2 class="page-title">
            Add New Course
        </h2>


    </div>

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="page-card">

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-4">

                        <label class="form-label">
                            Course Name
                        </label>

                        {{ form.course_name }}

                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-4">

                            <label class="form-label">
                                Duration
                            </label>

                            {{ form.duration }}

                        </div>

                        <div class="col-md-6 mb-4">

                            <label class="form-label">
                                Course Fees
                            </label>

                            {{ form.fees }}

                        </div>

                    </div>

                    <hr>

                    <div class="d-flex justify-content-end gap-3 mt-4">

                        <a href="{% url 'course_list' %}"
                           class="btn btn-outline-secondary btn-cancel">

                            Cancel

                        </a>

                        <button type="submit"
                                class="btn btn-primary btn-save">

                            Save Course

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
