{% extends "base.html" %}

{% load static %}

{% block css %}
<link rel="stylesheet" href="{% static 'style/style.css' %}">
{% endblock %}

{% block content %}

<div class="container">

    <!-- Page Heading -->

    <div class="text-center pb-4 pt-3">

        <h2 class="page-title">
            Add New Faculty
        </h2>


    </div>

    <div class="row justify-content-center">

        <div class="col-lg-10">

            <div class="page-card">

                <form method="POST">

                    {% csrf_token %}



                    <div class="row">
                        <div class="col-md-4 mb-4">

                            <label class="form-label">
                                Faculty Name
                            </label>

                            {{ form.faculty_name }}

                        </div>
                        <div class="col-md-4 mb-4">

                            <label class="form-label">
                                Email Address
                            </label>

                            {{ form.email }}

                        </div>

                        <div class="col-md-4 mb-4">

                            <label class="form-label">
                                Phone Number
                            </label>

                            {{ form.phone }}

                        </div>

                    </div>
                    <div class="row">

                        <div class="col-md-6 mb-4">

                            <label class="form-label">
                                Subject
                            </label>

                            {{ form.subject }}

                           

                        </div>
                         <div class="col-md-6 mb-4">
                                <label class="form-label">Assigned Courses</label>
                                {{ form.assigned_courses }}
                            </div>
                    </div>


                    <hr>

                    <div class="d-flex justify-content-end gap-3 mt-4">

                        <a href="{% url 'faculty_list' %}" class="btn btn-outline-secondary btn-cancel">

                            Cancel

                        </a>

                        <button type="submit" class="btn btn-primary btn-save">

                            Save Faculty

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
